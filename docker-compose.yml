services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sandplanet
      POSTGRES_USER: sandplanet
      POSTGRES_PASSWORD: sandplanet-local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio-local
      MINIO_ROOT_PASSWORD: minio-local-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  web:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: sandplanet
      POSTGRES_USER: sandplanet
      POSTGRES_PASSWORD: sandplanet-local
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minio-local
      S3_SECRET_KEY: minio-local-secret
      S3_BUCKET: sandplanet-local
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - minio

volumes:
  pgdata:
  miniodata:
