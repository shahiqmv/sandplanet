# Production stack (M8) — DigitalOcean droplet: Postgres + app (gunicorn) +
# Caddy (auto-HTTPS). Uploaded files go to DigitalOcean Spaces (S3), so no
# MinIO here. Reads secrets from .env (see .env.prod.example).
#
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db           # in-network hostname, overrides .env
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"                    # reachable by caddy only, not the host

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  pgdata:
  caddy_data:
  caddy_config:
