<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 400" width="1500" height="400">
  <!-- Sand Planet logo — vector trace of the official mark (2026-07-07).
       Emblem: concentric rings offset toward top-right, so bands read
       thicker at bottom-left. Solid fills only (WeasyPrint: no gradients). -->
  <circle cx="210" cy="200" r="150" fill="#29ABE2"/>
  <circle cx="224" cy="186" r="117" fill="#FFFFFF"/>
  <circle cx="219" cy="191" r="109" fill="#1B75BB"/>
  <circle cx="230" cy="180" r="84"  fill="#FFFFFF"/>
  <circle cx="226" cy="184" r="77"  fill="#16527E"/>
  <circle cx="234" cy="176" r="59"  fill="#FFFFFF"/>
  <text x="430" y="248" font-family="Helvetica, Arial, sans-serif"
        font-size="128" fill="#231F20" letter-spacing="10"><tspan
        font-weight="300">SAND</tspan><tspan font-weight="700">PLANET</tspan></text>
</svg>
