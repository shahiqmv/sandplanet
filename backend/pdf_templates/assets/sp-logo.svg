<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 84" width="340" height="84">
  <!-- Sand Planet ring emblem — vector recreation of the letterhead logo.
       Replace with the official asset file when provided (same filename). -->
  <defs>
    <linearGradient id="ring" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16527E"/>
      <stop offset="45%" stop-color="#1B75BB"/>
      <stop offset="100%" stop-color="#29ABE2"/>
    </linearGradient>
  </defs>
  <circle cx="42" cy="42" r="30" fill="none" stroke="url(#ring)" stroke-width="13"/>
  <circle cx="42" cy="42" r="30" fill="none" stroke="#29ABE2" stroke-width="13"
          stroke-dasharray="66 123" stroke-dashoffset="-24" opacity="0.55"/>
  <text x="92" y="55" font-family="Arial, Helvetica, sans-serif" font-size="34"
        letter-spacing="1.5">
    <tspan fill="#58595B" font-weight="600">SAND</tspan><tspan fill="#8A8C8E" font-weight="400">PLANET</tspan>
  </text>
</svg>
